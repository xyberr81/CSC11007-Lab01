name: YAS Monorepo CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Detect which services changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      changed-services: ${{ steps.changes.outputs.changed-services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed services
        id: changes
        run: |
          # List all services in monorepo
          SERVICES=("product" "cart" "customer" "order" "inventory" "payment" "payment-paypal" "rating" "search" "media" "location" "tax" "promotion" "webhook" "sampledata" "recommendation" "delivery")
          
          # Get changed files
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Find which services changed
          CHANGED_SERVICES=""
          for service in "${SERVICES[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "^$service/"; then
              CHANGED_SERVICES="$CHANGED_SERVICES $service"
            fi
          done
          
          # If pom.xml changed, build all services
          if echo "$CHANGED_FILES" | grep -q "^pom.xml"; then
            CHANGED_SERVICES="${SERVICES[*]}"
          fi
          
          # Convert to JSON array for matrix strategy
          if [ -n "$CHANGED_SERVICES" ]; then
            JSON_SERVICES=$(echo $CHANGED_SERVICES | tr ' ' '\n' | jq -R . | jq -s .)
          else
            JSON_SERVICES="[]"
          fi
          
          echo "Changed services: $CHANGED_SERVICES"
          echo "JSON: $JSON_SERVICES"
          
          echo "services=$JSON_SERVICES" >> $GITHUB_OUTPUT
          echo "changed-services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT

  # Job 2: Test Phase - Run unit tests for changed services
  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed-services != '' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run Tests for ${{ matrix.service }}
        run: mvn clean test -pl ${{ matrix.service }} -am
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/target/surefire-reports/*.xml
            ${{ matrix.service }}/target/failsafe-reports/*.xml
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/

  # Job 3: Build Phase - Build and package applications
  build:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: ${{ needs.detect-changes.outputs.changed-services != '' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build Application
        run: mvn clean package -DskipTests -pl ${{ matrix.service }} -am
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: ${{ matrix.service }}/target/*.jar

  # Final Job: The one you will select in GitHub Branch Protection settings
  ci-success:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always() # This must run even if some matrix jobs were skipped
    steps:
      - name: Check Status
        run: |
          # If there were no changes, this should still pass
          # If there were changes, ensure test and build were successful
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.build.result }}" == "failure" ]]; then
            echo "CI failed!"
            exit 1
          fi
          echo "CI passed!"
