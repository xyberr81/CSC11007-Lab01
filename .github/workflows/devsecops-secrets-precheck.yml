name: DevSecOps Secrets Precheck

on:
  workflow_dispatch:

jobs:
  precheck:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SONAR_TOKEN exists
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing"
            exit 1
          fi
          echo "::add-mask::$SONAR_TOKEN"
          echo "SONAR_TOKEN is configured"

      - name: Validate SNYK_TOKEN exists
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN is missing"
            exit 1
          fi
          echo "::add-mask::$SNYK_TOKEN"
          echo "SNYK_TOKEN is configured"
